server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/product_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

custom:
  message: "Welcome to the Product Service!"